<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1>테트리스</h1>

    <div class="game-layout">
      <section class="board-section">
        <div id="game-board" aria-label="테트리스 게임 보드"></div>
      </section>

      <aside class="side-panel">
        <div class="score-box">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <button id="start-btn" type="button" class="btn">시작</button>

        <section class="controls">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> <kbd>→</kbd> : 좌우 이동</li>
            <li><kbd>↓</kbd> : 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 회전</li>
            <li><kbd>Space</kbd> : 즉시 낙하</li>
          </ul>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
